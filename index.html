<!DOCTYPE html>
<html>
  <head>
    <title>3D Maze Escape</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <script src="js/main.js"></script>
  </head>
  <body>
    <a-scene maze-builder>
      <a-sky color="#87CEEB"></a-sky> 
      <a-plane position="0 0 0" rotation="-90 0 0" width="50" height="50" color="#2E8B57"></a-plane>

      <a-entity id="player" position="3 0 3" wasd-controls="acceleration: 100" player-collider>
        
        <a-cylinder id="player-body" position="0 1 0" height="2" radius="0.4" color="#FF6B6B" visible="false">
          
          <a-entity position="0 0.4 -0.4">
            
            <a-sphere position="-0.15 0 0" radius="0.08" color="white">
              <a-sphere position="0 0 -0.06" radius="0.04" color="black"></a-sphere>
            </a-sphere>

            <a-sphere position="0.15 0 0" radius="0.08" color="white">
              <a-sphere position="0 0 -0.06" radius="0.04" color="black"></a-sphere>
            </a-sphere>

            <a-box position="0 -0.25 0" width="0.2" height="0.05" depth="0.1" color="#333"
                   animation="property: scale; to: 1 4 1; dir: alternate; dur: 250; loop: true"></a-box>
                   
          </a-entity>
        </a-cylinder>
        
        <a-entity id="camera" camera look-controls position="0 1.6 0"></a-entity>
        
      </a-entity>
    </a-scene>
  </body>
</html>
