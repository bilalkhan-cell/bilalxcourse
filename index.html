<!DOCTYPE html><html><head><title>My First Git Page</title><style>body{margin:0;height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#0f172a,#1e293b,#334155);font-family:Arial,sans-serif;overflow:hidden}h1{color:white;font-size:4rem;animation:pop 1.5s ease-out forwards,glow 2s infinite alternate;text-align:center}.sub{color:#cbd5e1;text-align:center;animation:fade 3s ease-in-out infinite}@keyframes pop{0%{transform:scale(0) rotate(-20deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}@keyframes glow{from{text-shadow:0 0 10px #fff}to{text-shadow:0 0 30px #60a5fa,0 0 60px #60a5fa}}@keyframes fade{0%,100%{opacity:.4}50%{opacity:1}}</style></head><body><div><h1>🚀 My First Git Page</h1><p class='sub'>Welcome to my GitHub Page ✨</p></div></body></html>
